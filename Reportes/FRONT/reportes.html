<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes de Préstamos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
</head>
<body class="container mt-3">
  <div class="card">
    <div class="card-header">
      <div class="text-start">
        <small class="text-muted">Cuenta MetaMask conectada:</small>
        <code id="cuentaConectada" class="text-danger">Conectando...</code>
      </div>
      <h1 class="text-center">Sistema de Préstamos - Reportes</h1>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <button class="btn btn-info btn-sm" onclick="buscarReportes()">BUSCAR</button>
        <button class="btn btn-success btn-sm" onclick="agregarReporte()">NUEVO</button>
      </div>
      <div class="table-responsive">
        <table class="table table-bordered table-hover table-sm">
          <thead>
            <tr>
              <th>ID</th>
              <th>ESTADO CUENTA</th>
              <th>PENDIENTES</th>
              <th>PAGADOS</th>
              <th>TOTAL FINANCIERO</th>
              <th>ESTADO</th>
              <th>ACCIONES</th>
            </tr>
          </thead>
          <tbody id="reportesBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
<script src="reportes.js"></script>
