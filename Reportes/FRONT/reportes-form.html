<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes de Préstamos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="container mt-3">
  <div class="card">
    <div class="card-header"><h1 class="text-center">Reporte Financiero de Préstamos</h1></div>
    <div class="card-body">
      <div class="mb-3">
        <label for="estadoCuenta" class="form-label">ESTADO DE CUENTA</label>
        <input type="text" class="form-control" id="estadoCuenta">
      </div>
      <div class="mb-3">
        <label for="prestamosPendientes" class="form-label">PRÉSTAMOS PENDIENTES</label>
        <input type="number" class="form-control" id="prestamosPendientes" min="0">
      </div>
      <div class="mb-3">
        <label for="prestamosPagados" class="form-label">PRÉSTAMOS PAGADOS</label>
        <input type="number" class="form-control" id="prestamosPagados" min="0">
      </div>
      <div class="mb-3">
        <label for="totalFinanciero" class="form-label">TOTAL FINANCIERO</label>
        <input type="number" class="form-control" id="totalFinanciero" step="0.01" min="0">
      </div>
      <button class="btn btn-primary" onclick="guardarReporte()">GUARDAR</button>
      <button class="btn btn-secondary" onclick="cancelar()">CANCELAR</button>
    </div>
  </div>
</body>
</html>
<script src="reportes-form.js"></script>
